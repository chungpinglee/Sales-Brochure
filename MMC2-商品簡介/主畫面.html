<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMC-2 主畫面互動地圖</title>
    <style>
        :root {
            --bg-color: #f8fafc;
        }

        body {
            font-family: "Microsoft JhengHei", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 10px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            max-width: fit-content;
        }

        .image-wrapper {
            position: relative;
            line-height: 0;
        }

        img {
            display: block;
            max-width: 100%;
            height: auto;
            border: 1px solid #e2e8f0;
            border-radius: 4px;
        }

        area {
            cursor: pointer;
            outline: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="image-wrapper">
            <!-- 加入 id="target-img" 供腳本辨識 -->
            <img id="target-img" src="MMC-2主畫面.png" usemap="#image-map" alt="MMC-2主畫面" onerror="this.alt='找不到圖片檔案'; this.style.padding='50px';">

            <map name="image-map">
                <area target="_blank" alt="商品簡介" title="商品簡介" href="https://drive.google.com/file/d/1HtzybMG5gerV7A3VzAvRBf51loQ-2cBW/view?usp=sharing" coords="742,594,598,548" shape="rect">
                <area target="_blank" alt="影片介紹" title="影片介紹" href="https://drive.google.com/file/d/1xX8-ESHmyYPgej7Y962gg2QNIgAVylMo/view?usp=drive_link" coords="602,615,742,656" shape="rect">
                <area target="_blank" alt="保單條款" title="保單條款" href="https://drive.google.com/file/d/1VmQTlk20AeZN8GfAHcwIz-ZTRkK5_6c6/view?usp=drive_link" coords="525,785,647,897" shape="rect">
            </map>
        </div>
    </div>

    <script>
        /**
         * 自動縮放 Image Map 座標的腳本
         */
        function makeMapResponsive() {
            const map = document.querySelector('map[name="image-map"]');
            const img = document.getElementById('target-img');
            const areas = map.getElementsByTagName('area');
            
            // 儲存原始座標（只在第一次執行時存入 data-coords）
            for (let area of areas) {
                if (!area.dataset.coords) {
                    area.dataset.coords = area.getAttribute('coords');
                }
            }

            function resize() {
                // 取得目前圖片顯示寬度與原始圖片寬度的比例
                const ratio = img.offsetWidth / img.naturalWidth;
                
                if (ratio === 0) return; // 圖片尚未載入完全

                for (let area of areas) {
                    const coords = area.dataset.coords.split(',');
                    const scaledCoords = coords.map(c => Math.round(parseInt(c) * ratio));
                    area.setAttribute('coords', scaledCoords.join(','));
                }
            }

            // 監聽圖片載入與視窗縮放事件
            if (img.complete) {
                resize();
            } else {
                img.onload = resize;
            }
            window.addEventListener('resize', resize);
        }

        // 啟動腳本
        window.onload = makeMapResponsive;
    </script>

</body>
</html>
