    <style>

        }

            ::-webkit-scrollbar {
                width: 12px;
                height: 12px;
            }
        }
        
        /* 預設拉桿樣式 (適用於左側/上方分類目錄) */
        ::-webkit-scrollbar-track {
            background: #f1f5f9;

            background-color: #cbd5e1; 
            border-radius: 8px;
            border: 2px solid transparent; 
            background-clip: padding-box; 
        }

            background-color: #94a3b8;

        /* ★ 專門針對內容文字區的藍色拉桿設定 ★ */

            background-color: #3b82f6; 
            border-radius: 8px;
            border: 2px solid transparent;

            background-color: transparent;

        }

            background-color: #22c55e;

    <script>
        // === 拖曳調整寬度邏輯 (僅針對桌面版) ===
        const sidebar = document.getElementById('sidebar');
        const resizer = document.getElementById('resizer');
        let isResizing = false;

        resizer.addEventListener('mousedown', (e) => {
            if (window.innerWidth < 768) return; // 手機版不啟用左右拖曳
            isResizing = true;
            resizer.classList.add('resizing');
            document.body.style.cursor = 'col-resize';
            document.body.style.userSelect = 'none';
        });

        document.addEventListener('mousemove', (e) => {
            if (!isResizing || window.innerWidth < 768) return;
            let newWidthPercent = (e.clientX / window.innerWidth) * 100;
            if(newWidthPercent > 15 && newWidthPercent < 60) {
                sidebar.style.width = newWidthPercent + '%';
            }
        });

        document.addEventListener('mouseup', () => {
            if (isResizing) {
                isResizing = false;
                resizer.classList.remove('resizing');
                document.body.style.cursor = '';
                document.body.style.userSelect = '';
            }
        });

        // 當切換視窗大小到手機版時，清除桌面的 inline style 確保 50% 比例正常運作
        window.addEventListener('resize', () => {
            if (window.innerWidth < 768) {
                sidebar.style.width = '';
            }
        });

        // 包含完整條款與展開之HTML表格的資料
        const FULL_TEXT = `--- PAGE 1 ---

南山產物

查詢本公司資訊公開說明文件,請上本公司網站,
 網址:www.nanshangeneral.com.tw,或至本公司索取。

南山產物個人旅行平安保險

【主要給付項目:身故保險金或喪葬費用保險金、失能保險金】

第一條保險契約之構成

108.12.13 南山保字第1080001540號函備查
 113.10.30 南山保字第1130004447號函備查

本保險契約所載之條款及其他各種附加之條款、要保書、批單及與本
 保險契約有關之要保書,均為本保險契約之構成部分。

本保險契約之解釋,應探求契約當事人之真意,不得拘泥於所用之文
 字;如有疑義時,以作有利於被保險人之解釋為原則。

第二條承保範圍

被保險人於本保險契約有效期間內,因遭受意外傷害事故,致其身體
 蒙受傷害而致失能或死亡時,本公司依照本保險契約的約定,給付保
 險金。

前項所稱意外傷害事故,指非由疾病引起之外來突發事故。

第三條 保險期間的始日與終日

本保險契約的保險期間,以本保險契約保險單上所載日時為準。

第四條保險期間的延長

如被保险人以乘客身分搭乘領有載客執照之交通工具,該交通工具之
 預定抵達時刻係在本保險契約的保險期間內,因故延遲抵達而非被保
 險人所能控制者,本保險單自動延長有效期限至被保險人终止乘客身
 分時為止,但延長之期限不得超過二十四小時。

前項被保險人以乘客身分搭乘領有載客執照之交通工具,因遭劫持,
 於劫持中本保險契約的保險期間如已終止,本保單自動延長有效期間
 至劫持事故終了。劫持事故終了係指被保險人完全脫離被劫持的狀況。

第五條身故保險金或喪葬費用保險金的給付

被保險人於本保險契約有效期間內遭受第二條約定的意外傷害事故,
 自意外傷害事故發生之日起一百八十日以內死亡者,本公司按保險金
 額給付身故保險金。但超過一百八十日死亡者,受益人若能證明被保
 險人之死亡與該意外傷害事故具有因果關係者,不在此限。

訂立本保險契約時,以未滿十五足歲之未成年人為被保險人,除喪葬
 費用之給付外,其餘死亡給付之约定於被保險人滿十五足歲之日起發
 生效力;被保險人滿十五足歲前死亡者,其身故保險金變更為喪葬費
 用保險金。

前項未滿十五足歲之被保險人如有於民國九十九年二月三日(不含)
 前訂立之保險契約,其喪葬費用保險金之給付依下列方式辦理:
 一、被保險人於民國九十九年二月三日(不含)前訂立之保險契約,
 喪葬費用保險金額大於或等於遺產及贈與稅法第十七條有關遺產
 稅喪葬費扣除額之半數(含)者,其喪葬費用保險金之給付,從
 其約定,一百零九年六月十二日(含)以後所投保之喪葬費用保
 險金額,本公司不負給付責任,並應無息退還該超過部分之已繳
 保險費。

二、被保險人於民國九十九年二月三日(不含)前訂立之保險契約,
 喪葬費用保險金額小於遺產及贈與稅法第十七條有關遺產稅喪葬
 費扣除額之半數(含)者應加計民國一百零九年六月十二日(含)
 以後所投保之喪葬費用保險金額,被保險人死亡時,受益人得領
 取之喪葬費用保險金總和(不限本公司),不得超過遺產及贈與稅
 法第十七條有關遺產稅喪葬費扣除額之半數。超過部分,本公司
 不負給付責任,並應無息退還該超過部分之已繳保險費。

訂立本保險契約時,以受監護宣告尚未撤銷者為被保險人,其身故保
 險金變更為喪葬費用保險金。

第二項未滿十五足歲之被保險人於民國一百零九年六月十二日(含)
 以後及第四項被保險人於民國九十九年二月三日(含)以後所投保之
 喪葬費用保險金額總和(不限本公司),不得超過遺產及贈與稅法第十
 七條有關遺產稅喪葬費扣除額之半數,其超過部分本公司不負給付責
 任,本公司並應無息退還該超過部分之已繳保險費。

第三項及第五項情形,如要保人向二家(含)以上保險公司投保,或
 向同一保險公司投保數個保險契(附)約,且其投保之喪葬費用保險

金額合計超過所定之限額者,本公司於所承保之喪葬費用金額範圍
 內,依各要保書所載之要保時間先後,依約給付喪葬費用保險金至前
 項喪葬費用額度上限為止,如有二家以上保險公司之保險契約要保時
 間相同或無法區分其要保時間之先後者,各該保險公司應依其喪葬費
 用保險金額與扣除要保時間在先之保險公司應理賠之金額後所餘之限
 額比例分擔其責任。

第六條失能保險金的給付

被保險人於本保險契約有效期間內遭受第二條約定的意外傷害事故,
 自意外傷害事故發生之日起一百八十日以內致成附表所列失能程度之
 一者,本公司給付失能保險金,其金額按該表所列之給付比例計算。
 但超過一百八十日致成失能者,受益人若能證明被保險人之失能與該
 意外傷害事故具有因果關係者,不在此限。

被保險人因同一意外傷害事故致成附表所列二項以上失能程度時,本
 公司給付各該項失能保險金之和,最高以保險金額為限。但不同失能
 項目屬於同一手或同一足時,僅給付一項失能保險金;若失能項目所
 屬失能等級不同時,給付較嚴重項目的失能保險金。

被保險人因本次意外傷害事故所致之失能,如合併以前(含本保險契
 約訂立前)的失能,可領附表所列較嚴重項目的失能保險金者,本公
 司按較嚴重的項目給付失能保險金,但以前的失能,視同已給付失能
 保險金,應扣除之。

前項情形,若被保險人扣除以前的失能後得領取之保險金低於單獨請
 領之金額者,不適用合併之約定。

被保險人於本保險契約有效期間內因不同意外傷害事故申領失能保險
 金時,本公司累計給付金額最高以保險金額為限。

第七條 保險給付之限制

被保險人於本保險契約有效期間內因同一意外傷害事故致成失能後身
 故,並符合本保險契約第五條及第六條約定之申領條件時,本公司之
 給付總金額合計最高以保險金額為限。

前項情形,受益人已受領失能保險金者,本公司僅就保險金額與已受
 領金額間之差額負給付責任。

被保險人於本保險契約有效期間內因不同意外傷害事故致成失能、身
 故時,受益人得依第五條及第六條之約定分別申領保險金,不適用第
 一項之約定。

第八條除外責任(原因)

被保險人因下列原因致成死亡、失能或傷害時,本公司不負給付保險
 金的責任:

一、要保人、被保險人的故意行為。
 二、被保險人犯罪行為。

三、被保險人飲酒後駕(騎)車,其吐氣或血液所含酒精成份超過道
 路交通法令規定標準者。

四、戰爭(不論宣戰與否)、內亂及其他類似的武裝變亂。但契約另有
 約定者不在此限。

五、非以乘客身分搭乘航空器具或搭乘非經當地政府登記許可之民用
 飛行客機者。但契約另有約定者,不在此限。

六、因原子或核子能裝置所引起的爆炸、灼熱、輻射或污染。但契約
 另有约定者不在此限。

前項第一款情形(除被保險人的故意行為外),致被保險人傷害或失能
 時,本公司仍給付保險金。

第九條不保事項

被保險人從事下列活動,致成死亡、失能或傷害時,除契約另有約定
 外,本公司不負給付保險金的責任:

一、被保險人從事角力、摔跤、柔道、空手道、跆拳道、馬術、拳擊、
 特技表演等的競賽或表演。

二、被保險人從事汽車、機車及自由車等的競賽或表演。

第十條告知義務

要保人在訂立本保險契約時,對於本公司要保書書面(或投保網頁)
 詢問的告知事項應據實說明,如有為隱匿或遺漏不為說明,或為不實

 約,其保險事故發生後亦同。但危險的發生未基於其說明或未說明的
 事實時,不在此限。

第十一條保險費之交付

要保人應於訂立本保險契約後,向本公司所在地、指定地點或指定方
 式交付保險費,本公司應給予收據。除經本公司同意延緩交付者外,
 對於保險費交付前所發生之保險事故,本公司不負給付保險金之責。

第十二條契約的無效

本保險契約訂立時,僅要保人知保險事故已發生者,契約無效。本公
 司不退還所收受之保險費。

第十三條批註

本保險契約內容的變更,或記載事項的增刪,除第二十條另有規定外,
 應經要保人與本公司雙方書面或其他約定方式同意,並由本公司即予
 批註或發給批註書。

第十四條契約終止

要保人終止契約者,除終止日另有約定外,自終止之通知送達本公司
 翌日起契約終止之。

被保險人於本保險契約有效期間內非因本保險契約約定的意外傷害事
 故身故時,本保險契約效力即行終止。

對於終止後應返還之保險費,本公司應從已繳保險費扣除已經過期間
 之保險費後,將其未滿期保險費退還要保人。

本保險契約因本公司破產或要保人破產而終止時,本公司依第三項約
 定返還保險費。

第十五條 外國貨幣之計價

對於被保險人之損失或本公司給付保險金之計算涉及外國貨幣時,其
 匯率之計算以下列日期臺灣銀行即期現金賣出匯價為準:

一、以國外所開立之收據申請理賠者,以收據開立日期為計算日。
 二、由本公司直接墊付者,以本公司墊付日為計算日。

第十六條 保險事故的通知與保險金的申請時間

被保險人於本保險契約有效期間內遭受第二條約定的意外傷害事故
 時,要保人、被保險人或受益人應於知悉意外傷害事故發生後十日內
 將事故狀況及被保險人的傷害程度,通知本公司。並於通知後儘速檢
 具所需文件向本公司申請給付保險金。

本公司應於收齊前項文件後十五日內給付之。但因可歸責於本公司之
 事由致未在前述約定期限內為給付者,應按年利一分加計利息給付。

第十七條失蹤處理

被保險人在本保險契約有效期間內因第二條所約定的意外傷害事故失
 蹤,於戶籍資料所載失蹤之日起滿一年仍未尋獲,或要保人、受益人
 能提出證明文件足以認為被保險人極可能因本保險契約所約定之意外
 傷害事故而死亡者,本公司按第五條約定先行給付身故保險金或喪葬費
 用保險金,但日後發現被保險人生還時,要保人或受益人應將該筆已領
 之退還已繳保險費或身故保險金或喪葬費用保險金歸還本公司,其間有
 應繳而未繳之保險費者,於要保人一次清償後,本保險契約自原终止日
 繼續有效,本公司如有應行給付其他保險金情事者,仍依約給付。

第十八條身故保險金或喪葬費用保險金的申領

受益人申領「身故保險金或喪葬費用保險金」時應檢具下列文件:

一、保險金申請書。

二、保險單或其謄本。

三、相驗屍體證明書或死亡診斷書;但必要時本公司得要求提供意外

傷害事故證明文件。

四、被保險人除戶戶籍謄本。

五、受益人的身分證明。

第十九條失能保險金的申領

受益人申領「失能保險金」時應檢具下列文件:

一、保險金申請書。

二、保險單或其謄本。

三、失能診斷書:但必要時本公司得要求提供意外傷害事故證明文件。
 四、受益人之身分證明。

第二十條受益人的指定及變更

失能保險金的受益人,為被保險人本人,本公司不受理其指定或變更。
 受益人之指定及變更,要保人得依下列約定辦理,並應符合指定或變
 更當時法令之規定:

一、於訂立本保險契約時,經被保險人同意指定受益人。

二、於保險事故發生前經被保險人同意變更受益人,如要保人未將前
 述變更通知本公司者,不得對抗本公司。

前項受益人的變更,於要保人檢具申請書及被保險人的同意書(要、
 被保險人為同一人時為申請書或電子申請文件)送達本公司時,本公
 司應即予批註或發給批註書。本公司為身故或失能給付時,應以受益
 人直接申領為限。

受益人同時或先於被保險人本人身故,除要保人已另行指定受益人,
 以被保險人之法定繼承人為本保險契約受益人。

前項法定繼承人之順序及應得保險金之比例適用民法繼承編相關規定。

第二十一條受益人之受益權

受益人故意致被保險人於死或雖未致死者,喪失其受益權。
 前項情形,如因該受益人喪失受益權,而致無受益人受領保險金額時,
 其保險金額作為被保險人遺產。如有其他受益人者,喪失受益權之受
 益人原應得之部分,按其他受益人原約定比例分歸其他受益人。

第二十二條消滅時效

由本保險契約所生之權利,自得為請求之日起,經過二年不行使而消滅。

第二十三條 調解與仲裁

本公司與被保險人對於理賠發生爭議時,被保險人經申訴未獲得解決
 者,得提出申訴或提交調解或仲裁,其程序及費用等,依相關法令或
 仲裁法規定辦理。

第二十四條管轄法院

因本保險契約涉訟者,同意以要保人住所地地方法院為第一審管轄法
 院,要保人的住所在中華民國境外時,以臺灣臺北地方法院為第一審
 管轄法院。但不得排除消費者保護法第四十七條及民事訴訟法第四百
 三十六條之九小額訴訟管轄法院之適用。

第二十五條 法令之適用

本保險契约未約定之其他事項,悉依照中華民國保險法及相關法令之
 規定辦理。

 註1:

1-1. 於審定「神經障害等級」時,須有精神科、神經科、神經外科或
 復健科專科醫師診斷證明及相關檢驗報告(如簡式智能評估表
 (MMSE)、失能評估表(modified Rankin Scale, mRS)、臨床失智評估
 量表(CDR)、神經電生理檢查報告、神經系統影像檢查報告及相符
 之診斷檢查報告等)資料為依據,必要時保險人得另行指定專科
 醫師會同認定。

(1)「為維持生命必要之日常生活活動」係指食物攝取、大小便
 始末、穿脫衣服、起居、步行、入浴等。

(2)有失語、失認、失行等之病灶症狀、四肢麻痺、錐體外路症
 狀、記憶力障害、知覺障害、感情障害、意欲減退、人格變化
 等顯著障害;或者麻痺等症狀,雖為輕度,身體能力仍存,但
 非他人在身邊指示,無法遂行其工作者:適用第3級。

(3)中樞神經系統障害,例如無知覺障害之錐體路及錐體外路症
 狀之輕度麻痺,依影像檢查始可證明之輕度腦萎縮、腦波異常
 等屬之,此等症狀須據專科醫師檢查、診斷之結果審定之。

(4)中樞神經系統之頹廢症狀如發生於中樞神經系統以外之機能
 障害,應按其發現部位所定等級定之,如障害同時併存時,應
 綜合其全部症狀擇一等級定之,等級不同者,應按其中較重者
 定其等級。

1-2.「平衡機能障害與聽力障害」等級之審定:因頭部損傷引起聽力
 障害與平衡機能障害同時併存時,須綜合其障害狀況定其等級。
 1-3.「外傷性癲癇」障害等級之審定:癲癇發作,同時應重視因反復
 發作致性格變化而終至失智、人格崩壞,即成癲癇性精神病狀態
 者,依附註1-1原則審定之。癲癇症狀之固定時期,應以經專科醫
 師之治療,認為不能期待醫療效果時,及因治療致症狀安定者為

第一條承保範圍

茲經雙方同意,要保人於投保南山產物個人旅行平安保險(以下簡稱
 主保險契約)後,加繳保險費,投保南山產物個人旅行平安保險傷害
 醫療費用給付附加條款(以下簡稱本附加條款),本公司就被保險人於
 保險期間內遭受主保險契約第二條約定的意外傷害事故,自意外傷害
 事故發生之日起一百八十日以內,經登記合格的醫院或診所治療者,
 本公司就其實際醫療費用,超過全民健康保險給付部分,給付傷害醫
 療保險金。但超過一百八十日繼續治療者,受益人若能證明被保險人
 之治療與該意外傷害事故具有因果關係者,不在此限。

前項同一次傷害的給付總額不得超過保險單所記載的「每次實支實付
 傷害醫療保險金限額」。

被保險人不以全民健康保險之保險對象身分診療;或前往不具有全民
 健康保險之醫院診療者,致各項醫療費用未經全民健康保險給付,本
 公司依被保險人實際支付之各項費用之百分之百給付,惟給付總額仍
 以「每次實支實付傷害醫療保險金限額」為限。

第二條傷害醫療保險金的申領

五、受益人之身分證明。

第三條傷害醫療保險金受益人的指定

第四條條款之適用

本附加條款所記載事項,如與主保險契約牴觸時,依本附加條款約定

第一條保險契約的構成

本保險單條款、附著之要保書、批註及其他約定書,均為本保險契約
 (以下簡稱本契約)的構成部分。

本契約的解釋,應探求契約當事人的真意,不得拘泥於所用的文字;
 如有疑義時,以作有利於被保險人的解釋為原則。

第二條 保險範圍

被保險人於本契約有效期間內,因遭受意外傷害事故,致其身體蒙受
 傷害,本公司依照本契約的約定,給付保險金。

第三條名詞定義

本契約各項名詞定義如下:

一、傷害:係指被保險人於本契約有效期間內,遭受意外傷害事故,
 因而蒙受之傷害。

二、意外傷害事故:係指非由疾病引起之外來突發事故。

三、醫師:係指合法領有醫師執照之執業醫師,且非要保人、被保險人。

第四條保險期間的始日與終日

本契約的保險期間,以本契約保險單上所載日時為準。

第五條 保險期間的延長

如被保險人以乘客身分搭乘領有載客執照之交通工具,該交通工具之
 預定抵達時刻係在本契約的保險期間內,因故延遲抵達而非被保險人
 所能控制者,本保險單自動延長有效期限至被保險人終止乘客身分時
 為止,但延長之期限不得超過二十四小時。

前項被保险人以乘客身分搭乘領有載客執照之交通工具,因遭劫持,
 於劫持中本契約的保險期間如已終止,本保單自動延長有效期間至劫
 持事故終了。劫持事故終了係指被保險人完全脫離被劫持的狀況。

第六條傷害醫療保險金的給付

被保險人於本契約有效期間內遭受第二條約定的意外傷害事故,自意
 外傷害事故發生之日起一百八十日以內,經登記合格的醫院或診所治

療者,本公司就其實際醫療費用,超過全民健康保險給付部分,給付
 「傷害醫療保險金」。但超過一百八十日繼續治療者,受益人若能證明
 被保險人之治療與該意外傷害事故具有因果關係者,不在此限。
 前項同一次意外傷害事故的給付總額不得超過保險單所記載的「每次
 實支實付傷害醫療保險金限額」。

倘被保險人於本契約有效期間內身故致本契約效力終止時,本公司應
 從本契約已繳保險費扣除已經過期間之保險費後,將其未滿期保險費
 退還要保人。

第七條除外責任(原因)

被保險人因下列原因致成傷害時,本公司不負給付保險金的責任:
 一、要保人、被保險人的故意行為。

二、被保險人犯罪行為。

三、被保險人飲酒後駕(騎)車,其吐氣或血液所含酒精成份超過道

路交通法令規定標準者。

四、戰爭(不論宣戰與否)、內亂及其他類似的武裝變亂。但契约另有
 約定者不在此限。

五、非以乘客身分搭乘航空器具或搭乘非經當地政府登記許可之民用
 飛行客機者。但契約另有約定者,不在此限。

六、因原子或核子能裝置所引起的爆炸、灼熱、輻射或污染。但契約
 另有約定者不在此限。

前項第一款情形(除被保險人的故意行為外),致被保險人傷害時,本
 公司仍給付保險金。

第八條不保事項

被保險人從事下列活動,致成傷害時,除契約另有約定外,本公司不
 負給付保險金的責任:

一、被保險人從事角力、摔跤、柔道、空手道、跆拳道、馬術、拳擊、
 特技表演等的競賽或表演。

二、被保險人從事汽車、機車及自由車等的競賽或表演。

第九條契約的無效

本契約訂立時,僅要保人知保險事故已發生者,契約無效。本公司不
 退還所收受之保險費。

第十條告知義務與本契約的解除

要保人在訂立本契約時,對於本公司要保書書面詢問的告知事項應據
 實說明,如有為隱匿或遺漏不為說明,或為不實的說明,足以變更或
 減少本公司對於危險的估計者,本公司得解除契約,其保險事故發生
 後亦同。但危險的發生未基於其說明或未說明的事實時,不在此限。
 前項解除契約權,自本公司知有解除之原因後經過一個月不行使而消滅。

第十一條 保險事故的通知與保險金的申請時間
 被保險人於本契約有效期間內遭受第二條約定的意外傷害事故時,要
 保人、被保險人或受益人應於知悉意外傷害事故發生後十日內將事故
 狀況及被保險人的傷害程度,通知本公司。並於通知後儘速檢具所需
 文件向本公司申請給付保險金。

本公司應於收齊前項文件後十五日內給付之。但因可歸責於本公司之
 事由致未在前述約定期限內為給付者,應按年利一分加計利息給付。

第十二條傷害醫療保險金的申領

受益人申領「傷害醫療保險金」時應檢具下列文件:

一、保險金申請書。

二、保險單或其謄本。

三、醫療診斷書或住院證明;但必要時本公司得要求提供意外傷害事
 故證明文件。

四、醫療費用明細或醫療證明文件(或醫療費用收據)。
 五、受益人之身分證明。

受益人申領保險金時,本公司基於審核保險金之需要,得徵詢其他醫
 師之醫學專業意見,並得經受益人同意調閱被保險人之就醫相關資
 料。因此所生之費用由本公司負擔。

第十三條傷害醫療保險金受益人之指定

傷害醫療保險金的受益人,為被保險人本人,本公司不受理其指定或
 變更。

被保險人身故時,如本契約保險金尚未給付或未完全給付,則以被保
 險人之法定繼承人為該部分保險金之受益人。

前項法定繼承人之順序及應得保險金之比例適用民法繼承編相關規定。
 第十四條時效

由本契約所生的權利,自得為請求之日起,經過兩年不行使而消滅。
 第十五條批註

本契約內容的變更,或記載事項的增刪,除第十三條另有規定外,應
 經要保人與本公司雙方書面或其他约定方式同意,並由本公司即予批
 註或發給批註書。

第十六條管轄法院

因本契約涉訟者,同意以要保人住所地地方法院為第一審管轄法院,
 要保人的住所在中華民國境外時,以本公司總公司所在地地方法院為
 第一審管轄法院。但不得排除消費者保護法第四十七條及民事訴訟法
 第四百三十六條之九小額訴訟管轄法院之適用。

第二條名詞定義

本附加保險名詞定義如下:

一、「海外」:係指臺灣、澎湖、金門、馬祖等由中華民國政府所轄
 範圍以外之地區。

二、「突發疾病」:係指被保險人需即時在醫院或診所診療始能避免
 損及身體健康之疾病,且在本附加保險生效前一百八十日以內,
 未曾接受該疾病之診療者。

三、「醫院」:係指依照當地醫療法規定領有開業執照並設有病房收
 治病人之公、私立及醫療法人醫院。

四、「診所」:係指依照當地醫療法規定領有開業執照的診所。

五、「住院」:係指被保險人經醫師診斷其突發疾病必須入住醫院,
 且正式辦理住院手續並確實在醫院接受診療者。但不包含相當於
 中華民國全民健康保險法所稱之日間住院及精神衛生法所稱之日
 間照護。

六、「醫師」:係指依照當地政府之法令規定,合法領有醫師執照之
 執業醫師,且非要保人本人或被保險人本人。

七、「返國後繼續住院診療」:係指被保險人於海外罹患突發疾病實
 實際住院診療而於返國前一日內始出院,並因同一疾病於入境後一
 日內住院診療。

第三條海外突發疾病住院醫療保險金的給付

被保險人於本附加保險有效期間內,在海外因突發疾病而需住院診療
 時,本公司就其住院第一日起至第一百八十日止所實際發生之住院醫
 療費用給付「海外突發疾病住院醫療保險金」。但同一海外突發疾病住
 院給付總額以本附加保險所載之「海外突發疾病醫療保險金限額」乘
 上「海外特定地區限額調整係數表」(如附表)之調整係數所得之金額
 為限。

前項「住院醫療費用」包含病房費、管灌飲食以外之膳食費、特別護
 士以外之護理費、醫師指示用藥、血液(非緊急傷病必要之輸血)、掛
 號費及證明文件、來往醫院之救護車費、手術費、診療費、檢驗費、
 治療材料費及醫療器材使用費。

第四條海外突發疾病返國住院醫療保險金的給付

被保險人於本附加保險有效期間內,在海外因突發疾病而需住院診
 療,且因同一突發疾病於返國後繼續住院診療者,本公司對被保險人
 返國後繼續住院診療所實際發生之住院醫療費用負給付責任。但同一
 海外突發疾病於返國後繼續住院給付總額以本附加保險所載之「海外
 突發疾病醫療保險金限額」之百分之十為限。

第五條海外突發疾病門診醫療保險金的給付
 被保險人於本附加保險有效期間內,在海外因突發疾病而需接受門診
 診療時,本公司就其實際發生之門診醫療費用給付「海外突發疾病門
 診醫療保險金」,但每次門診醫療保險金的給付總額以本附加保險所載
 之「海外突發疾病醫療保險金限額」乘上「海外特定地區限額調整係
 數表」(如附表)之調整係數所得金額之百分之三為限。

第六條海外突發疾病急診醫療保險金的給付

被保險人於本附加保險有效期間內,在海外因突發疾病而需接受急診
 診療時,本公司就其實際發生之急診醫療費用給付「海外突發疾病急
 診醫療保險金」,但每次急診醫療保險金的給付總額以本附加保險所載
 之「海外突發疾病醫療保險金限額」乘上「海外特定地區限額調整係
 數表」(如附表)之調整係數所得金額之百分之十為限。

第七條住院次數之計算及契約有效期間屆滿後住院之處理
 被保險人於本附加保險有效期間內,因同一海外突發疾病,或因此引
 起之併發症,於出院後十四日內於同一醫院再次住院時,其各項保險
 金給付合計額,視為一次住院辦理。

前項保險金之給付,倘被保險人係於本附加保險有效期間屆滿後出院
 者,本公司就再次住院部分不予給付保險金。

第八條除外責任

被保險人因下列各款疾病或原因所生之住院、門診或急診費用,本公
 司不負給付海外突發疾病的各項醫療保險金的責任:

一、因主保險契約除外責任之原因及不保事項之活動致成之疾病。
 二、任何以獲得海外醫療為目的之出國治療行為。

三、被保險人之故意行為(包括自殺及自殺未遂)。
 四、被保險人之犯罪行為。

五、被保險人非法施用防制毒品相關法令所稱之毒品。

被保險人因下列事故所生之住院、門診或急診費用,本公司不負給付
 海外突發疾病的各項醫療保險金的責任:

 一、美容手術、外科整型。但為重建其基本功能所作之必要整型,不
 在此限。

二、外觀可見之天生畸形。

三、非因當次住院事故治療之目的所進行之牙科手術。

四、裝設義齒、義肢、義眼、眼鏡、助聽器或其它附屬品。

五、健康檢查、療養、靜養、戒毒、戒酒、護理或養老之非以直接診
 治病人為目的者。

六、懷孕、流產或分娩及其併發症。但下列情形不在此限:

(一)懷孕相關疾病:

1. 子宮外孕。

2. 葡萄胎。

3. 前置胎盤。

4. 胎盤早期剝離。

5. 產後大出血。

6. 子癲前症。

7.子癇症。

8. 萎縮性胚胎。

9. 胎兒染色體異常之手術。

(二)因醫療行為所必要之流產,包含:

1. 因本人或其配偶患有礙優生之遺傳性、傳染性疾病或精
 神疾病。

2. 因本人或其配偶之四親等以內之血親患有礙優生之遺
 傳性疾病。

3. 有醫學上理由,足以認定懷孕或分娩有招致生命危險或
 危害身體或精神健康。

4. 有醫學上理由,足以認定胎兒有畸型發育之虞。

5. 因被強制性交、誘姦或與依法不得結婚者相姦而受孕
 者。

(三)醫療行為必要之剖腹產,並符合下列情況者:

1. 產程遲滯:已進行充足引產,但第一產程之潛伏期過長
 (經產婦超過14小時、初產婦超過20小時),或第一產
 程之活動期子宮口超過2小時仍無進一步擴張,或第二
 產程超過2小時胎頭仍無下降。

2. 胎兒窘迫,係指下列情形之一者:

a. 在子宮無收縮情況下,胎心音圖顯示每分鐘大於160
 次或少於100次且呈持續性者,或胎兒心跳低於基礎
 心跳每分鐘30次且持續60秒以上者。

 第四條共同不保事項

一、被保險人犯罪行為。

二、被保險人故意行為。

三、被保險人違反任何政府或法令之規定,或任何從事政府或法令禁
 止之行為。

四、被任何政府機關沒收、扣押或銷毀。

五、非以乘客身分搭乘航空器具或搭乘非經當地政府登記許可之民用
 飛行客機者。

六、因原子或核子能裝置所引起之爆炸、灼熱、輻射或污染。

七、因戰爭、類似戰爭行為(不論宣戰與否)、外敵入侵、外敵行為、
 內戰、叛亂、革命、軍事反叛、恐怖主義者之行為所致者。但本
 保險契約另有約定者不在此限。

八、被保險人參加軍事行動。

第五條 保險期間

本保險契約的保險期間,以本保險契約保險單上所載日時為準。
 本保險契約所載日時以中原標準時間為準。

第六條 保險期間的延長

如被保险人以乘客身分搭乘領有載客執照之交通工具,該交通工具之
 預定抵達時刻像在本保險契約的保險期間內,因故延遲抵達而非被保
 險人所能控制者,本保險契約自動延長有效期限至被保險人終止乘客
 身分時為止,但延長之期限不得超過二十四小時。

前項被保险人以乘客身分搭乘領有載客執照之交通工具,因遭劫持,
 於劫持中本保險契約的保險期間如已終止,本保險契約自動延長有效
 期間至劫持事故終了。劫持事故終了係指被保險人完全脫離被劫持的
 狀況。

第七條 保險費之交付

要保人應於本保險契約訂立時,向本公司所在地或指定地點交付保險
 費。要保人於交付保險費時,本公司應給與收據或繳款證明或委由代
 收機構出具其它相關之繳款證明為憑。除經本公司同意延緩交付外,
 對於保險費交付前所發生之損失,本公司不負賠償責任。

第八條告知義務與本保險契約的解除

要保人在訂立本保險契約時,對於本公司要保書書面(或投保網頁)詢
 問的告知事項應據實說明,如有為隱匿或遺漏不為說明,或為不實之
 說明,足以變更或減少本公司對於危險之估計者,本公司得解除本保
 險契約,其危險發生後亦同。但要保人證明危險之發生未基於其說明
 或未說明之事實時,不在此限。

前項解除契約權,自本公司知有解除之原因後,經過一個月不行使而
 消滅。

本公司依第一項規定解除保險契約時,已收受之保險費不予退還;倘
 已經理賠者,得請求被保險人返還。

本保險契約之內容,倘有變更之需要,或有關保險契約權益之轉讓,
 非經本公司書面或其他約定方式簽批同意,不生效力。

第十條契約終止

要保人終止契約者,除終止日另有約定外,自终止之書面或其他約定
 方式送達本公司之時起契約終止之。對於終止前之保險費,本公司按
 本保險契約實際有效之天數計算應繳保險費,並返還已繳保險費與應
 繳保險費間之差額。

第十一條事故發生之通知

被保險人應於知悉發生事故後五日內,通知本公司。

本保險契約所承保之損失,若有其他保險契約亦加以承保時,本公司

 金額之比例,負賠償之責。

第十三條消滅時效

由本保險契約所生之權利,自得為請求之日起,經過二年不行使而消
 減。有下列各款情形之一者,其期限之起算,依各該款之規定:

一、要保人或被保險人對於危險之說明,有隱匿、遺漏或不實者,自
 保險人知情之日起算。

二、危險發生後,利害關係人能證明其非因疏忽而不知情者,自其知
 情之日起算。

三、要保人或被保險人對於保險人之請求,係由第三人之請求而生者,
 自要保人或被保險人受請求之日起算。

第十四條 外國貨幣之計價

對於被保險人之損失或本公司給付保險金之計算涉及外國貨幣時,其
 匯率之計算以下列日期臺灣銀行現金賣出收盤匯價為準,如該日非為
 臺灣銀行之營業日,則以臺灣銀行前一個營業日為計算日:

一、以國外所開立之收據申請理賠者,以收據開立日期為計算日。
 二、由本公司直接墊付者,以本公司墊付日為計算日。

第十五條 申訴、調解或仲裁

本公司與要保人或被保險人對於因本保險契約所生爭議時,得提出申
 訴或提交調解或經雙方同意提交仲裁,其程序及費用等,依相關法令
 或仲裁法規定辦理。

第十六條 法令適用

本保險契約未約定之其他事項,悉依照中華民國保險法及相關法令之
 規定辦理。

第十七條管轄法院

因本保險契約涉訟者,同意以要保人住所地地方法院為第一審管轄法
 院,要保人的住所在中華民國境外時,以臺灣臺北地方法院為第一審
 管轄法院。但不得排除消費者保護法第四十七條及民事訴訟法第四百
 三十六條之九小額訴訟管轄法院之適用。

第四十條用詞定義

本章之用詞定義如下:

一、傷害:係指被保險人遭受非由疾病引起之外來突發事故,因而蒙
 受之傷害。

二、疾病:係指被保險人於海外旅行期間,於海外感染或發生之疾病。
 但不包括既有疾病及懷孕、生育、流產所引起之疾病。

三、既有疾病:係指於實際進行海外旅程前六個月內,有接受醫生診
 療之疾病。

四、重大傷病:係指被保險人經合格開業醫生診斷證明,若繼續旅行
 將危及生命之傷害或疾病。

五、合格開業醫生:係指經當地政府核可得從事醫療行為者,但不包
 括被保險人本人或其親屬。

六、住院:係指因疾病或傷害,經合格開業醫生診斷,必須住院診療,
 經正式辦理住院手續,且確實在醫院接受診療者。住院天數之計
 算以醫院收取住院之病房費之天數為準。

七、醫院:係指依照醫療法規定領有開業執照並設有病房收治病人之
 公、私立及財團法人醫院;但不包括主要供休養、戒毒、戒酒、
 護理、養老等非以直接診治病人為目的之醫療機構。

八、同行夥伴:係指全程陪伴被保險人參加同一旅程之人。

九、後天免疫不全症候群(愛滋病)AIDS:係指依世界衛生組織定義,
 人體免疫不全病毒血清測試呈陽性反應(sero-positive test for
 HIV)後所出現之機遇性感染(Opportunistic Infection)、惡性
 腫瘤(Malignant Neoplasm)、人體免疫不全病毒感染性腦病變
 (Human Immune Deficiency Virus Encephalopathy, Dementia)、
 人體免疫不全病毒之消瘦症候群(HIV Wasting Syndrome)及其
 他病症。

十、機遇性感染:係指肺囊原蟲肺炎(Pneumocystis Carinii
 Pneumonia)、慢性腸炎之生物體(Organism of Chronic
 Enteritis)、病毒和散佈性的黴菌感染或其他無害之微生物在人
 體抵抗力減弱時造成之感染。

十一、惡性腫瘤:係指在出現人體免疫不全病毒後發生並導致死亡、
 疾病或失能之卡波西氏血管瘤(Kaposi's Sarcoma)、中樞神
 經系統淋巴瘤(Central Nervous System Lymphoma)或其他惡
 性病變。

 旅程,對於被保險人無法取回之預繳團費、交通、住宿及票券之費用,
 本公司依本附加條款之約定對被保險人負理賠之責:

一、被保險人於特定期間內於中華民國境內接受強制檢疫。

二、被保險人預定前往之地點發生衛生福利部所公告之國際旅遊疫情
 建議等級於特定期間內達到第三級之情事。

 發布命令關閉邊境,或禁止外籍人士或外籍航空進入該國國
 四、被保險人所搭乘自中華民國出發之班機起飛後,該航班目的地之
 政府機關始發布命令,為防治傳染病而關閉邊境,或禁止外籍人
 上或外籍航空進入該國國境致被保險人無法入境而必須返回中華
 民國。

 旅行期間開始時止。如前項第一款至第三款所定情事早於預定海外旅
 程開始前二十日或遲於海外旅行期間開始後發生者,本公司不負理賠
 之責。

 費用且無法拆分者,相關費用應依人數比例計算,但保險期間內賠付
 金額之加總以本附加條款所載保險金額為限。

 交通工具或物品的活動和(或)將其與其他的個人和物體隔離,
 以防止感染或污染的可能傳播之措施。

        function findIndexFuzzy(text, searchStr, startIndex = 0) {
            if (!searchStr) return -1;
            
            let textToSearch = text.substring(startIndex);
            let cleanText = textToSearch.replace(/\s+/g, '');
            let cleanSearch = searchStr.replace(/\s+/g, '');
            
            let matchIndex = cleanText.indexOf(cleanSearch);
            if (matchIndex === -1) return -1;
            
            let charCount = 0;
            for (let i = 0; i < textToSearch.length; i++) {
                if (!/\s/.test(textToSearch[i])) {
                    if (charCount === matchIndex) {
                        return startIndex + i;
                    }
                    charCount++;
                }
            }
            return -1;
        }

        function extractText(startStr, endStr) {
            let processText = FULL_TEXT;

            if (!startStr) return processText.replace(/--- PAGE \d+ ---/g, '').trim();

            let startIndex = findIndexFuzzy(processText, startStr);
            if (startIndex === -1) {
                return "系統提示：未能於文件中精確找到該條文開頭。";
            }

            let extracted = "";
            if (endStr) {
                let endIndex = findIndexFuzzy(processText, endStr, startIndex + 10);
                if (endIndex === -1) {
                    extracted = processText.substring(startIndex);
                } else {
                    extracted = processText.substring(startIndex, endIndex);
                }
            } else {
                extracted = processText.substring(startIndex);
            }

            return formatText(extracted.replace(/--- PAGE \d+ ---/g, '').trim());
        }

        function formatText(text) {
            let formatted = text.replace(/(第[一二三四五六七八九十百]+章.+)/g, '<span class="highlight-chapter">$1</span>');
            formatted = formatted.replace(/(第[一二三四五六七八九十百]+條.+)/g, '<span class="highlight-title">$1</span>');
            return formatted;
        }

        const menuList = document.getElementById('menuList');
        const contentTitle = document.getElementById('contentTitle');
        const contentBody = document.getElementById('contentBody');
        const searchInput = document.getElementById('searchInput');
        const copyBtn = document.getElementById('copyBtn');
        let currentText = "";

        function renderMenu(filterText = "") {
            menuList.innerHTML = "";
            categories.forEach((cat, index) => {
                if (cat.title.toLowerCase().includes(filterText.toLowerCase())) {
                    const btn = document.createElement('button');
                    btn.className = "w-full text-left px-3 py-2.5 md:px-4 md:py-3 rounded-md text-sm text-gray-700 hover:bg-green-600 hover:text-white focus:bg-blue-100 focus:text-blue-800 transition border border-transparent hover:border-green-500 mb-1 flex items-start gap-1 md:gap-2 group";
                    
                    btn.innerHTML = `
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-red-500 shrink-0 mt-0.5 group-hover:text-white transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z" /></svg> 
                        <span class="leading-tight">${cat.title}</span>`;
                    
                    btn.onclick = () => {
                        document.querySelectorAll('#menuList button').forEach(b => {
                            b.classList.remove('bg-blue-100', 'text-blue-800', 'border-blue-300', 'font-bold');
                        });
                        btn.classList.add('bg-blue-100', 'text-blue-800', 'border-blue-300', 'font-bold');
                        
                        contentTitle.innerText = cat.title;
                        const rawContent = extractText(cat.start, cat.end);
                        contentBody.innerHTML = rawContent;
                        
                        const tempDiv = document.createElement('div');
                        tempDiv.innerHTML = rawContent;
                        currentText = tempDiv.innerText;

                        copyBtn.disabled = false;
                        copyBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                        
                        document.getElementById('scrollContainer').scrollTop = 0;
                    };
                    menuList.appendChild(btn);
                }
            });
        }

        searchInput.addEventListener('input', (e) => {
            renderMenu(e.target.value);
        });

        function copyContent() {
            if (!currentText) return;
            
            const textarea = document.createElement('textarea');
            textarea.value = `【${contentTitle.innerText}】\n\n${currentText}`;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);

            const toast = document.getElementById('toast');
            const btnText1 = document.getElementById('copyBtnText');
            const btnText2 = document.querySelector('#copyBtn span.sm\\:hidden'); // 手機版短文字
            
            toast.classList.remove('opacity-0');
            btnText1.innerText = "已複製！";
            btnText2.innerText = "已複製";
            
            setTimeout(() => {
                toast.classList.add('opacity-0');
                btnText1.innerText = "複製內容";
                btnText2.innerText = "複製";
            }, 2000);
        }
