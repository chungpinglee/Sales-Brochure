<!DOCTYPE html>
<html lang="zh-Hant">
<head>

    <title>金平安 PRO 6.0 理賠文件導覽</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f8fafc;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        /* 按鈕基礎樣式與 Hover 效果 */
        .category-pill {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .category-pill:hover {
            background-color: #1d4ed8 !important; /* 滑過時：藍色填滿 */
            color: white !important; /* 滑過時：白色文字 */
        }
        .category-pill.active {
            background-color: #1d4ed8 !important;
            color: white !important;
            box-shadow: 0 10px 15px -3px rgba(29, 78, 216, 0.3);
            transform: scale(1.05);
        }
        /* 指定紅字粗體樣式 */
        .highlight-red {
            color: #dc2626;
            font-weight: 800;
        }
    </style>
</head>

            const container = document.getElementById('claim-list');
            container.innerHTML = '';

            const filtered = category === '全部'

                : claimData.filter(item => item.category === category);

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-20 text-slate-400">
                        <p>請點選分類按鈕展開各項詳細理賠文件要求</p>

                return;
            }

                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
            
            // 自動捲動
            if(category !== '全部') {
                const headerOffset = 150;
                const elementPosition = container.getBoundingClientRect().top;
                const offsetPosition = elementPosition + window.pageYOffset - headerOffset;
                window.scrollTo({ top: offsetPosition, behavior: 'smooth' });
            }
        }

        function filterCategory(category) {
            document.querySelectorAll('.category-pill').forEach(btn => {
                btn.classList.remove('active');
            });
            const activeBtn = document.getElementById(`btn-${category}`);
            if (activeBtn) activeBtn.classList.add('active');

            renderClaims(category);
        }
