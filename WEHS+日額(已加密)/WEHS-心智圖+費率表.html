<style>
  body { font-family: 'Noto Sans TC', "Microsoft JhengHei", sans-serif; background-color: #f8fafc; overflow: hidden; }
  
  /* 心智圖容器 */
  #mindmap-container { width: 100%; height: 100%; position: relative; }
  #mindmap { width: 100%; height: 100%; display: block; }
  .tooltip-trigger { color: #166534; cursor: pointer; text-decoration: underline dotted; }
  .tooltip-trigger:hover { color: #dc2626; font-weight: bold; }

  /* 彈窗樣式 */
  #custom-tooltip {
    position: fixed; display: none; z-index: 2000; border-radius: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5); overflow-y: auto;
    width: 750px; max-width: 95vw; max-height: 85vh;
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    background-color: #ffffff; border: 1px solid #e2e8f0;
  }
  .tooltip-header { background-color: #2e7d32; color: #ffffff; padding: 14px; font-weight: bold; text-align: center; font-size: 18px; position: sticky; top: 0; z-index: 10; }
  .tooltip-body { padding: 24px; font-size: 14px; line-height: 1.8; color: #334155; text-align: justify; }
  .close-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 1999; display: none; backdrop-filter: blur(2px); }

  /* 表格樣式 */
  .health-table { width: 100%; border-collapse: collapse; margin: 15px 0; font-size: 13px; }
  .health-table th, .health-table td { border: 1px solid #cbd5e1; padding: 10px 8px; text-align: center; }
  .header-main { background-color: #0d9488 !important; color: white !important; }
  .example-box { background-color: #f0fdf4; border-left: 5px solid #22c55e; padding: 15px; margin-top: 15px; border-radius: 4px; }
  .example-title { color: #166534; font-weight: bold; display: block; margin-bottom: 5px; }
  .alert-box { background-color: #fff1f2; border-left: 5px solid #ef4444; padding: 12px; margin-top: 15px; color: #991b1b; }
  
  /* 按鈕狀態樣式 */
  .active-period { background-color: #9333ea !important; color: white !important; }
  .active-plan { background-color: #4f46e5 !important; color: white !important; }
  .highlight-cell { background-color: #16a34a !important; color: white !important; font-weight: bold !important; }
  .active-gender-male { background-color: #3a7d78 !important; color: white !important; }
  .active-gender-female { background-color: #c46a6a !important; color: white !important; }

  /* 橫式拖曳資訊盒 */
  #draggable-info-box {
    position: fixed; top: 120px; left: 20px; 
    background: rgba(255, 255, 255, 0.98);
    border: 1px solid #cbd5e1; padding: 8px 16px; border-radius: 50px; z-index: 50;
    box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
    cursor: move; display: flex; align-items: center; gap: 16px;
    border-left: 6px solid #4f46e5; white-space: nowrap; user-select: none;
  }
  .info-item { display: flex; align-items: center; gap: 4px; font-size: 13px; }
  .info-label { color: #64748b; font-weight: bold; }
  .info-value { color: #1e293b; font-800; }

  .input-invalid { background-color: #fee2e2 !important; color: #dc2626 !important; border-color: #fca5a5 !important; }
  .premium-error { color: #dc2626 !important; }
  .bg-error { background-color: #fef2f2 !important; border-color: #fecaca !important; }

  .nav-active { background-color: #2e7d32 !important; color: white !important; }
  .scrollbar-hide::-webkit-scrollbar { display: none; }

  /* 系統訊息提示 */
  #sys-toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.85); color: white; padding: 12px 24px;
    border-radius: 50px; font-size: 14px; z-index: 3000; display: none;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    animation: fadeInOut 2.5s ease-in-out;
  }
  @keyframes fadeInOut { 0% { opacity: 0; bottom: 10px; } 15% { opacity: 1; bottom: 30px; } 85% { opacity: 1; bottom: 30px; } 100% { opacity: 0; bottom: 50px; } }

  @media (max-width: 768px) {
    #draggable-info-box { top: 180px; left: 10px; padding: 6px 12px; border-radius: 12px; flex-wrap: wrap; max-width: 95vw; }
    #admin-tools-container button { padding: 4px 8px; font-size: 10px; }
  }
</style>
</head>

            ]},
          { content: `74歲以後最高總給付限額：<strong>${amounts.max[p]}</strong>`, children: [] }
        ]
      };
    
    function applyLevel(node, target, cur = 0) {
      if (!node.children || node.children.length === 0) return;
      if (!node.payload) node.payload = {};
      node.payload.fold = cur >= target ? 1 : 0;
      node.children.forEach(c => applyLevel(c, target, cur + 1));

    applyLevel(data, state.expandLevel);

  function validateDateInputs() {
    const yIn = document.getElementById('rocYear'), mIn = document.getElementById('rocMonth'), dIn = document.getElementById('rocDay');
    const now = new Date(); const curYear = now.getFullYear() - 1911;
    const check = (el, min, max) => {
        if (el.value === "") { el.classList.remove('input-invalid'); return false; }
        const val = parseInt(el.value); const ok = !isNaN(val) && val >= min && val <= max;
        if (!ok) el.classList.add('input-invalid'); else el.classList.remove('input-invalid');
        return ok;
    };
    const yOk = check(yIn, 25, curYear), mOk = check(mIn, 1, 12), dOk = check(dIn, 1, 31);
    if (yOk && mOk && dOk) calculateAge(); else updatePremiums();
    return yOk && mOk && dOk;
  }

  function calculateAge() {
    const yV = document.getElementById('rocYear').value, mV = document.getElementById('rocMonth').value, dV = document.getElementById('rocDay').value;
    if (!yV || !mV || !dV) return;
    const y = parseInt(yV), m = parseInt(mV), d = parseInt(dV);
    const birthDate = new Date(y + 1911, m - 1, d), now = new Date();
    
    let years = now.getFullYear() - birthDate.getFullYear(), months = now.getMonth() - birthDate.getMonth(), days = now.getDate() - birthDate.getDate();
    if (days < 0) { months--; const prevMonthDays = new Date(now.getFullYear(), now.getMonth(), 0).getDate(); days += prevMonthDays; }
    if (months < 0) { years--; months += 12; }
    const insAge = (months >= 6) ? years + 1 : years;
    state.age = insAge; document.getElementById('directAge').value = insAge;
    
    let nextInsM = (months < 6) ? 6 - months : 18 - months;
    let nextInsD = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate() - days;
    if (nextInsD < 0) nextInsD = 0;

    document.getElementById('calcAgeInfo').innerText = `實際年齡 ${years} 歲 ${months} 月又 ${days} 天，距保險年齡 ${insAge + 1} 歲尚有 ${nextInsM} 月又 ${nextInsD} 天`;
    document.getElementById('calcAgeInfo').classList.remove('hidden');
    if (insAge >= 74) setAgeView('after'); else setAgeView('before');
    updatePremiums();
  }

  function updatePremiums() {
    const ageVal = parseInt(document.getElementById('directAge').value);
    const warning = document.getElementById('ageWarning'), syncP = document.getElementById('sync-premium');
    const valM = document.getElementById('valMale'), valF = document.getElementById('valFemale');
    const boxM = document.getElementById('boxMale'), boxF = document.getElementById('boxFemale');

    [valM, valF, syncP].forEach(el => el.classList.remove('premium-error'));
    [boxM, boxF].forEach(el => el.classList.remove('bg-error'));

    const period = state.period;
    const maxAge = { 10: 70, 20: 60, 30: 50 }[period];

    let target = null;
    if (!isNaN(ageVal)) {
        if (ageVal < 0 || ageVal > maxAge) {
            warning.innerText = `⚠️ 年齡 (${ageVal} 歲) 超過 ${period} 年期上限 (${maxAge} 歲)`; warning.classList.remove('hidden');
            valM.innerText = '有誤！'; valF.innerText = '有誤！'; syncP.innerText = '有誤！';
            [valM, valF, syncP].forEach(el => el.classList.add('premium-error'));
            [boxM, boxF].forEach(el => el.classList.add('bg-error'));
        } else {
            const ages = Object.keys(ratesData[period].male).map(Number).sort((a,b)=>a-b);
            target = 0; for(let a of ages) { if(ageVal >= a) target = a; }
            const planIdx = (state.plan/10)-1;
            const mVal = ratesData[period].male[target][planIdx], fVal = ratesData[period].female[target][planIdx];
            valM.innerText = '$' + mVal.toLocaleString(); valF.innerText = '$' + fVal.toLocaleString();
            syncP.innerText = '$' + (state.gender === 'male' ? mVal : fVal).toLocaleString();
        }
    }

    const body = document.getElementById('tableBody'); body.innerHTML = '';
    const sortedAges = Object.keys(ratesData[period].male).map(Number).sort((a,b)=>a-b);
    sortedAges.forEach(a => {
        const row = document.createElement('tr'), isH = (target !== null && a === target);
        const mCells = ratesData[period].male[a].map((v, i) => `<td class="py-2.5 ${isH && state.gender === 'male' && i === (state.plan/10)-1 ? 'highlight-cell' : ''}">${v.toLocaleString()}</td>`).join('');
        const fCells = ratesData[period].female[a].map((v, i) => `<td class="py-2.5 bg-pink-50/30 ${isH && state.gender === 'female' && i === (state.plan/10)-1 ? 'highlight-cell' : ''}">${v.toLocaleString()}</td>`).join('');
        row.innerHTML = `<td class="py-2.5 px-4 font-bold bg-gray-50">${a}</td>${mCells}${fCells}`;
        body.appendChild(row);
    });
  }

  function toggleTable() { 
    state.tableVisible = !state.tableVisible; 
    document.getElementById('tableFrame').classList.toggle('hidden', !state.tableVisible); 
    document.getElementById('toggleText').innerText = state.tableVisible ? '費率表(隱藏)' : '費率表(展開)'; 
    document.getElementById('toggleIcon').classList.toggle('rotate-180', !state.tableVisible); 
  }

  window.showTip = (key) => {
    const item = summaries[key]; if (!item) return;
    const p = state.plan, d = amounts.daily[p], c = amounts.cancer[p], m = amounts.med[p], mi = amounts.misc[p], os = amounts.outSurg[p];
    const mi2 = mi * 2;
    const caseA_final_val = Math.min(200000, mi); 
    const mi2_actual_val = Math.min(360000, mi2); 
    
    const annPremStr = document.getElementById('sync-premium').innerText.replace(/[$,]/g, '');
    const annPrem = parseInt(annPremStr) || 0;
    const totalPaid = annPrem * state.period;
    const deathRes = Math.max(0, Math.floor(totalPaid * 1.06) - 300000);

    let html = item.content.replace(/{p}/g, p).replace(/{d}/g, fmt(d)).replace(/{c}/g, fmt(c)).replace(/{m}/g, fmt(m))
      .replace(/{mi}/g, fmt(mi)).replace(/{mi2}/g, fmt(mi2)).replace(/{os}/g, fmt(os))
      .replace(/{mi_disp}/g, fmt(mi)).replace(/{caseA_final}/g, fmt(caseA_final_val)).replace(/{mi2_actual}/g, fmt(mi2_actual_val))
      .replace(/{d_3}/g, fmt(d * 3)).replace(/{d_30}/g, fmt(d * 30)).replace(/{d_total}/g, fmt(d * 10)).replace(/{c_total}/g, fmt(c * 10))
      .replace(/{sum_total}/g, fmt((d + c) * 10)).replace(/{d_icu}/g, fmt(d * 3)).replace(/{sum_icu}/g, fmt(d * 2 * 3)).replace(/{total}/g, fmt(d * 10))
      .replace(/{g_txt}/g, state.gender === 'male' ? '男' : '女').replace(/{per}/g, state.period)
      .replace(/{ann_prem}/g, fmt(annPrem)).replace(/{total_paid}/g, fmt(totalPaid)).replace(/{death_res}/g, fmt(deathRes));
    
    let title = item.title.replace(/{p}/g, p);
    document.getElementById('tip-title').innerText = title; document.getElementById('tip-body').innerHTML = html;
    document.getElementById('custom-tooltip').style.display = 'block'; document.getElementById('overlay').style.display = 'block';
  };
  
  window.hideTip = () => { document.getElementById('custom-tooltip').style.display = 'none'; document.getElementById('overlay').style.display = 'none'; };
  
  function makeDraggable(el) {
    let p1=0, p2=0, p3=0, p4=0; el.onmousedown = dMD; el.ontouchstart = dMD;
    function dMD(e) {
      e = e || window.event;
      if (e.type === 'touchstart') { p3 = e.touches[0].clientX; p4 = e.touches[0].clientY; }
      else { p3 = e.clientX; p4 = e.clientY; }
      document.onmouseup = cD; document.ontouchend = cD; document.onmousemove = dr; document.ontouchmove = dr;
    }
    function dr(e) {
      e = e || window.event;
      let cx, cy; if (e.type === 'touchmove') { cx = e.touches[0].clientX; cy = e.touches[0].clientY; }
      else { cx = e.clientX; cy = e.clientY; }
      p1 = p3 - cx; p2 = p4 - cy; p3 = cx; p4 = cy;
      el.style.top = (el.offsetTop - p2) + "px"; el.style.left = (el.offsetLeft - p1) + "px";
    }
    function cD() { document.onmouseup = null; document.onmousemove = null; document.ontouchend = null; document.ontouchmove = null; }
  }

  function setAgeView(mode) { state.ageMode = mode; document.getElementById('age-before').className = mode === 'before' ? 'px-3 py-1 text-sm font-bold rounded-lg bg-green-700 text-white transition-all' : 'px-3 py-1 text-sm font-bold rounded-lg bg-gray-100 text-gray-600 transition-all'; document.getElementById('age-after').className = mode === 'after' ? 'px-3 py-1 text-sm font-bold rounded-lg bg-green-700 text-white transition-all' : 'px-3 py-1 text-sm font-bold rounded-lg bg-gray-100 text-gray-600 transition-all'; renderMindmap(); }
  function setExpand(l) { state.expandLevel = l; [1, 2, 3, 4, 99].forEach(lv => { const el = document.getElementById(lv === 99 ? 'exp-all' : `exp-${lv}`); if(el) el.className = lv === l ? 'px-3 py-1 text-sm font-bold rounded-lg bg-orange-600 text-white' : 'px-3 py-1 text-sm font-bold rounded-lg bg-gray-100 text-gray-600'; }); renderMindmap(); }

  function runAudit() { alert("🔍 系統同步檢核完成：\n1. 雜費細目已擴展為 16 條 (條款第21條)。\n2. 附屬品意外理賠例外已正確載入。\n3. 病房費用標題已動態帶入計畫數。"); }

  window.exportBackup = function() {
    const now = new Date(); const rocYear = now.getFullYear() - 1911;
    const dateStr = `${rocYear}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
    const data = { product: "WEHS", amounts, summaries, version: "10.0.Final" };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url;
    a.download = `WEHS備份-${dateStr}.json`; a.click(); URL.revokeObjectURL(url);
  };

  window.handleFileImport = function(event) {
    const file = event.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const data = JSON.parse(e.target.result); if (data.product !== "WEHS") throw new Error();
        amounts = data.amounts; summaries = data.summaries; renderMindmap(); alert("📥 數據匯入成功！");
      } catch (err) { alert("❌ 格式錯誤。"); }
    };
    reader.readAsText(file);
  };

  window.onload = () => {
    makeDraggable(document.getElementById("draggable-info-box"));
    ['rocYear', 'rocMonth', 'rocDay'].forEach(id => document.getElementById(id).addEventListener('input', validateDateInputs));
    document.getElementById('directAge').addEventListener('input', (e) => { 
        if (e.target.value !== "") {
            document.getElementById('rocYear').value = ""; document.getElementById('rocMonth').value = ""; document.getElementById('rocDay').value = "";
            document.querySelectorAll('.input-invalid').forEach(el => el.classList.remove('input-invalid'));
            document.getElementById('calcAgeInfo').classList.add('hidden');
        }
        state.age = parseInt(e.target.value); 
        if (!isNaN(state.age)) { 
            if (state.age >= 74) setAgeView('after'); else setAgeView('before'); 
            document.getElementById('sync-age').innerText = `年齡 ${state.age} 歲`;
        } else { document.getElementById('sync-age').innerText = '--'; }
        updatePremiums(); 
    });
    updateGlobalPlan(10); updateGlobalGender('male'); updateGlobalPeriod(10); showView('mindmap');
  };
</script>
</body>
