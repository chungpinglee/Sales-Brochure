<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>加密文件 🌿</title><style>
        :root {
            /* 普羅旺斯色彩計畫 */
            --lavender: #967BB6;
            --lavender-dark: #7B68EE;
            --sunflower: #FFDA03;
            --terracotta: #E2725B;
            --sage: #8A9A5B;
            --sky-blue: #87CEEB;
            --bg-cream: #FFF9E3;
            --text-coffee: #4B3621;
            
            --card-shadow: 0 15px 35px rgba(150, 123, 182, 0.2);
        }

        body, html { 
            height: 100%; margin: 0; 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "微軟正黑體", sans-serif; 
            background: var(--bg-cream);
            background-image: radial-gradient(circle at 20% 20%, rgba(255, 218, 3, 0.1) 0%, transparent 40%),
                              radial-gradient(circle at 80% 80%, rgba(150, 123, 182, 0.1) 0%, transparent 40%);
            color: var(--text-coffee); 
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            user-select: none;
            touch-action: manipulation;
        }

        .flower-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; opacity: 0.4;
            pointer-events: none;
        }

        .main-card {
            width: 95%; max-width: 450px;
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 24px;
            box-shadow: var(--card-shadow);
            border: 3px solid white;
            position: relative;
            backdrop-filter: blur(5px);
            text-align: center;
            z-index: 10;
        }

        header { margin-bottom: 30px; }
        h1 { font-size: 1.6rem; margin: 0; color: var(--lavender-dark); font-weight: 800; }
        .subtitle { font-size: 0.9rem; color: var(--sage); margin-top: 8px; font-weight: 600; }

        .upload-area {
            border: 3px dashed var(--lavender);
            border-radius: 20px; padding: 30px; cursor: pointer;
            transition: all 0.3s ease; margin-bottom: 24px; text-align: center;
            background: rgba(150, 123, 182, 0.05);
        }
        .upload-area:hover { transform: scale(1.02); background: rgba(150, 123, 182, 0.1); }

        .field { margin-bottom: 20px; text-align: left; }
        label { display: block; font-size: 0.9rem; font-weight: 700; color: var(--text-coffee); margin-bottom: 8px; }
        input {
            width: 100%; background: #ffffff; border: 2px solid var(--lavender);
            padding: 12px 16px; border-radius: 12px; color: var(--text-coffee); outline: none; transition: 0.2s;
            box-sizing: border-box; font-size: 14px;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 10px;
        }

        .btn-main {
            flex: 2; padding: 16px; background: var(--sunflower); color: var(--text-coffee);
            border: none; border-radius: 50px; font-weight: 800; font-size: 1.1rem;
            cursor: pointer; transition: 0.3s;
            box-shadow: 0 4px 15px rgba(255, 218, 3, 0.4);
        }
        .btn-main:hover { background: #f1c40f; transform: translateY(-2px); }
        
        .btn-clear {
            flex: 1; padding: 16px; background: var(--terracotta); color: white;
            border: none; border-radius: 50px; font-weight: 800; font-size: 0.95rem;
            cursor: pointer; transition: 0.3s;
            box-shadow: 0 4px 15px rgba(226, 114, 91, 0.3);
        }

        /* 解鎖提醒動畫 */
        .tap-reminder {
            margin: 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .tap-hand {
            font-size: 3.5rem;
            animation: tap-pulse 1s infinite;
            filter: drop-shadow(0 5px 10px rgba(150, 123, 182, 0.3));
        }

        @keyframes tap-pulse {
            0% { transform: scale(1) translateY(0); }
            50% { transform: scale(0.9) translateY(10px); }
            100% { transform: scale(1) translateY(0); }
        }

        /* 點擊漣漪效應 */
        .ripple {
            position: fixed;
            width: 50px;
            height: 50px;
            background: rgba(150, 123, 182, 0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            animation: ripple-out 0.6s linear;
            z-index: 9999;
        }

        @keyframes ripple-out {
            from { width: 0; height: 0; opacity: 1; }
            to { width: 300px; height: 300px; opacity: 0; }
        }

        #overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 249, 227, 0.95); z-index: 1000;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .loading-text { font-size: 1.2rem; color: var(--lavender-dark); font-weight: 700; margin-bottom: 20px; text-align: center; }
        .progress-container { width: 240px; height: 10px; background: #eee; border-radius: 10px; overflow: hidden; border: 2px solid white; }
        .progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, var(--lavender), var(--sky-blue)); transition: 0.3s; }

        iframe { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; border: none; z-index: 2000; background: white; }

        .footer-note { margin-top: 24px; font-size: 0.8rem; color: var(--sage); text-align: center; line-height: 1.5; font-style: italic; }
    </style></head><body><div class="flower-bg"><svg width="100%" height="100%"><circle cx="10%" cy="10%" r="50" fill="#967BB6" opacity="0.1"/><circle cx="90%" cy="90%" r="80" fill="#FFDA03" opacity="0.1"/></svg></div><div id="overlay"><div class="loading-text" id="status-msg"></div><div class="progress-container"><div id="progress-bar" class="progress-bar"></div></div></div><div class="main-card" id="ui-container"><div id="decrypt-view"><div class="tap-reminder"><div class="tap-hand">👆</div><div style="color:var(--lavender-dark);font-weight:700;font-size:1.4rem;text-align:center;letter-spacing:4px;margin-top:10px;">通關密語</div></div></div></div><iframe id="content-viewer"></iframe><script id="vault-logic">

            iv: "wW++TYLz+4tk8Eiz"

        const dom = {
            btn: document.getElementById('action-btn'),
            clear: document.getElementById('clear-btn'),
            file: document.getElementById('file-input'),
            drop: document.getElementById('drop-zone'),
            status: document.getElementById('status-msg'),
            overlay: document.getElementById('overlay'),
            progress: document.getElementById('progress-bar'),
            iframe: document.getElementById('content-viewer'),
            ui: document.getElementById('ui-container'),
            encView: document.getElementById('encrypt-view'),
            decView: document.getElementById('decrypt-view'),
            outName: document.getElementById('output-name'),
            label: document.getElementById('file-status'),
            header: document.getElementById('main-header'),
            footer: document.getElementById('main-footer')
        };

        let fileBuffer = null;
        let clickHistory = [];

        window.onload = () => {
            if (VAULT.payload !== "EMPTY_PAYLOAD") {
                // 解鎖模式：隱藏所有其餘文字
                dom.header.style.display = 'none';
                dom.footer.style.display = 'none';
                dom.encView.style.display = 'none';
                dom.decView.style.display = 'block';
            }
        };

        // 全域點擊監聽 (動畫提醒與邏輯)
        document.addEventListener('click', (e) => {
            createRipple(e);
            const now = Date.now();
            clickHistory.push(now);
            clickHistory = clickHistory.filter(t => now - t <= 2000);

            if (clickHistory.length >= 6) {
                clickHistory = []; 
                handleGestureAction();
            }
        });

        function createRipple(e) {
            const ripple = document.createElement('div');
            ripple.className = 'ripple';
            ripple.style.left = `${e.clientX}px`;
            ripple.style.top = `${e.clientY}px`;
            document.body.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        }

        async function handleGestureAction() {
            if (VAULT.payload !== "EMPTY_PAYLOAD") {
                dom.overlay.style.display = 'flex';
                updateUI(10, "手勢正確！正在開啟內容... 🧺");
                try {
                    await decrypt(CONFIG.internalKey);
                } catch (e) {
                    updateUI(100, "❌ 密鑰處理失敗 🍷");
                    setTimeout(() => dom.overlay.style.display = 'none', 1500);
                }
            }
        }

        if (dom.drop) {
            dom.drop.onclick = (e) => { e.stopPropagation(); dom.file.click(); };
            dom.file.onchange = (e) => handleFile(e.target.files[0]);
            dom.drop.ondragover = (e) => { e.preventDefault(); dom.drop.style.borderColor = "var(--terracotta)"; };
            dom.drop.ondrop = (e) => { e.preventDefault(); handleFile(e.dataTransfer.files[0]); };
        }

        if (dom.clear) {
            dom.clear.onclick = (e) => {
                e.stopPropagation();
                fileBuffer = null;
                dom.file.value = "";
                dom.label.innerText = "採集一份 HTML 檔案進行封裝 🧺";
                dom.outName.value = "";
            };
        }

        function handleFile(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                fileBuffer = e.target.result;
                dom.label.innerText = "✅ 已備好檔案：" + file.name;
                dom.outName.value = maskFilename(file.name);
            };
            reader.readAsText(file);
        }

        function maskFilename(name) {
            let base = name.replace(/\.html$/i, "");
            base = base.replace(/(\d{7})([\u4e00-\u9fa5]+)/, (match, d, n) => d + n[0] + "O".repeat(n.length - 1));
            base = base.replace(/\((.*?)\)/, (match, c) => "(" + c.split('-').map(p => p.length <= 2 ? p : p[0] + "O".repeat(p.length - 2) + p[p.length - 1]).join('-') + ")");
            return base + ".html";
        }

        dom.btn.onclick = async (e) => {
            e.stopPropagation();
            if (!fileBuffer) return;
            dom.overlay.style.display = 'flex';
            updateUI(10, "正在封裝您的秘密... 🌸");
            setTimeout(async () => {
                try {
                    await encrypt(CONFIG.internalKey);
                } catch (err) {
                    updateUI(100, "❌ 發生錯誤");
                    setTimeout(() => dom.overlay.style.display = 'none', 2000);
                }
            }, 200);
        };

        async function encrypt(pwd) {
            updateUI(40, "編織安全防護中... ☀️");
            const salt = crypto.getRandomValues(new Uint8Array(32));
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const dek = crypto.getRandomValues(new Uint8Array(32));

            const pEnc = await aesEnc(fileBuffer, dek, iv);
            const uKek = await derive(pwd, salt);
            const uWrapped = await aesEnc(dek, uKek, iv);

            updateUI(90, "準備完成加密包... 🥖");
            exportResult(pEnc, uWrapped, salt, iv);
        }

        async function decrypt(pwd) {
            updateUI(40, "執行隱藏式校驗... 🧺");
            const salt = b64ToU8(VAULT.salt);
            const iv = b64ToU8(VAULT.iv);
            const inputKek = await derive(pwd, salt);
            
            let dek = null;
            try {
                const dec = await aesDec(b64ToU8(VAULT.u_wrapped), inputKek, iv);
                dek = new Uint8Array(dec);
            } catch (e) {
                throw "INVALID_KEY";
            }
            
            updateUI(80, "解開數據封裝... ✨");
            const finalBuf = await aesDec(b64ToU8(VAULT.payload), dek, iv);
            const html = new TextDecoder().decode(finalBuf);
            render(html);
        }

        async function derive(p, s) {
            const mat = await crypto.subtle.importKey("raw", new TextEncoder().encode(p), "PBKDF2", false, ["deriveKey"]);
            return crypto.subtle.deriveKey(
                { name: "PBKDF2", salt: s, iterations: CONFIG.iter, hash: "SHA-256" },
                mat, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]
            );
        }

        async function aesEnc(d, kR, iv) {
            const k = (kR instanceof Uint8Array) ? await crypto.subtle.importKey("raw", kR, "AES-GCM", false, ["encrypt"]) : kR;
            const b = (typeof d === 'string') ? new TextEncoder().encode(d) : d;
            const e = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, k, b);
            return u8ToB64(new Uint8Array(e));
        }

        async function aesDec(c, kR, iv) {
            const k = (kR instanceof Uint8Array) ? await crypto.subtle.importKey("raw", kR, "AES-GCM", false, ["decrypt"]) : kR;
            return await crypto.subtle.decrypt({ name: "AES-GCM", iv }, k, c);
        }

        function exportResult(p, u, s, i) {
            const code = document.getElementById('vault-logic').innerHTML;
            let nCode = code;
            nCode = nCode.replace('payload: "EMPTY_PAYLOAD"', 'payload: "' + p + '"');
            nCode = nCode.replace('u_wrapped: "EMPTY_U"', 'u_wrapped: "' + u + '"');
            nCode = nCode.replace('salt: "EMPTY_SALT"', 'salt: "' + u8ToB64(s) + '"');
            nCode = nCode.replace('iv: "EMPTY_IV"', 'iv: "' + u8ToB64(i) + '"');

            const style = document.querySelector('style').innerHTML;
            const final = [
                '<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">',
                '<title>加密文件 🌿</title><style>', style, '</style></head><body>',
                '<div class="flower-bg"><svg width="100%" height="100%"><circle cx="10%" cy="10%" r="50" fill="#967BB6" opacity="0.1"/><circle cx="90%" cy="90%" r="80" fill="#FFDA03" opacity="0.1"/></svg></div>',
                '<div id="overlay"><div class="loading-text" id="status-msg"></div><div class="progress-container"><div id="progress-bar" class="progress-bar"></div></div></div>',
                '<div class="main-card" id="ui-container">',
                '<div id="decrypt-view"><div class="tap-reminder"><div class="tap-hand">👆</div><div style="color:var(--lavender-dark);font-weight:700;font-size:1.4rem;text-align:center;letter-spacing:4px;margin-top:10px;">通關密語</div></div></div>',
                '</div>',
                '<iframe id="content-viewer"></iframe><script id="vault-logic">', nCode, '<\/script></body></html>'
            ].join('');

            const blob = new Blob([final], { type: 'text/html' });
            const aLink = document.createElement('a');
            aLink.href = URL.createObjectURL(blob);
            aLink.download = dom.outName.value || "SECURE_VAULT.html";
            aLink.click();
            updateUI(100, "✅ 加密文件已準備好囉！");
            setTimeout(() => dom.overlay.style.display = 'none', 1000);
        }

        function render(h) {
            dom.ui.style.display = 'none';
            dom.overlay.style.display = 'none';
            dom.iframe.style.display = 'block';
            dom.iframe.src = URL.createObjectURL(new Blob([h], { type: 'text/html' }));
        }

        function updateUI(p, m) { dom.progress.style.width = p + "%"; dom.status.innerText = m; }
        function u8ToB64(u8) {
            let b = "";
            for (let i = 0; i < u8.length; i++) b += String.fromCharCode(u8[i]);
            return btoa(b);
        }
        function b64ToU8(b64) {
            const b = atob(b64);
            const u = new Uint8Array(b.length);
            for (let i = 0; i < b.length; i++) u[i] = b.charCodeAt(i);
            return u;
        }
    </script></body></html>
