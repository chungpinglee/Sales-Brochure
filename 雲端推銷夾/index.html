<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔒 系統安全防護鎖</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@500;700;900&display=swap');
        
        body { 
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%); 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            color: #334155; 
            font-family: 'Noto Sans TC', sans-serif; 
            overflow: hidden; 
        }

        .container {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            z-index: 10;
            background: rgba(255, 255, 255, 0.7);
            padding: 3rem;
            border-radius: 2rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.5);
            backdrop-filter: blur(10px);
        }

        .loader { 
            width: 50px; 
            height: 50px; 
            border: 3px solid #e2e8f0; 
            border-top: 3px solid #6366f1; 
            border-radius: 50%; 
            animation: spin 1s linear infinite; 
            margin-bottom: 1rem;
        }

        .main-text {
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: 0.1em;
            color: #1e293b;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 280px;
            margin-top: 10px;
            transition: opacity 0.3s;
        }

        .pwd-input {
            padding: 14px 20px;
            border-radius: 50px;
            border: 2px solid #cbd5e1;
            font-size: 1.1rem;
            outline: none;
            text-align: center;
            font-family: monospace;
            letter-spacing: 2px;
            transition: all 0.3s;
            background: white;
        }

        .pwd-input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }

        .unlock-btn {
            padding: 14px 20px;
            border-radius: 50px;
            border: none;
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            color: white;
            font-weight: 900;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.4);
            letter-spacing: 2px;
        }

        .unlock-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -5px rgba(99, 102, 241, 0.5);
        }
        
        .unlock-btn:active {
            transform: translateY(1px);
        }

        .error-msg {
            color: #ef4444;
            font-size: 0.9rem;
            font-weight: 700;
            height: 1.2rem;
            margin-top: 5px;
        }

        .bg-circle {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 1;
            animation: move 15s infinite alternate ease-in-out;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        @keyframes move {
            0% { transform: translate(-10%, -10%) scale(1); }
            100% { transform: translate(10%, 10%) scale(1.2); }
        }

        #footer-tag { 
            position: absolute; 
            bottom: 30px; 
            font-size: 10px; 
            letter-spacing: 2px;
            color: #94a3b8;
            font-weight: 700;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="bg-circle"></div>
    <div class="container">
        <div id="loaderIcon" class="loader" style="display:none;"></div>
        <div id="lockIcon" style="font-size: 3.5rem; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));">🔐</div>
        <div class="main-text">安全防護鎖</div>
        
        <div id="inputArea" class="input-group">
            <input type="password" id="pwdInput" class="pwd-input" placeholder="請輸入解鎖密碼">
            <button onclick="handleUnlock()" class="unlock-btn">解鎖檔案</button>
            <div id="errorMsg" class="error-msg"></div>
        </div>
    </div>
    <div id="footer-tag">MULTI-KEY SECURE ACCESS V5.0</div>

                            fileKeyString = decryptedKeyStr;
                            break; // 成功找到鑰匙，跳出迴圈
                        }
                    } catch (e) {
                        // 解密失敗，這把鑰匙不是這個密碼的，換下一把試試
                    }
                }

                if (!fileKeyString) {
                    // 所有鑰匙都試過了，密碼錯誤
                    document.getElementById('loaderIcon').style.display = 'none';
                    document.getElementById('lockIcon').style.display = 'block';
                    document.getElementById('inputArea').style.opacity = '1';
                    document.getElementById('pwdInput').disabled = false;
                    document.getElementById('pwdInput').value = '';
                    document.getElementById('pwdInput').focus();
                    document.getElementById('errorMsg').innerText = '密碼錯誤，請重新輸入！';
                    return;
                }

                // 密碼正確，取得 File Key，開始解密真實內容
                await unlockWithFileKey(fileKeyString);

            }, 50);
        }

        async function unlockWithFileKey(fileKeyString) {
            try {
                const enc = new TextEncoder();
                const bytes = new Uint8Array(base64ToBuffer(_DATA));
                const salt = bytes.slice(0, 16);
                const iv = bytes.slice(16, 28);
                const data = bytes.slice(28);

                const keyMat = await crypto.subtle.importKey("raw", enc.encode(fileKeyString), "PBKDF2", false, ["deriveKey"]);
                const contentKey = await crypto.subtle.deriveKey(
                    { name: "PBKDF2", salt, iterations: 1000, hash: "SHA-256" },
                    keyMat, { name: "AES-GCM", length: 256 }, false, ["decrypt"]
                );

                const decryptedContent = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, contentKey, data);

                // 將解密成功的金鑰存入 Session，達成全站快速通行
                sessionStorage.setItem(SESSION_PASS_KEY, fileKeyString);
                
                document.open();
                document.write(new TextDecoder().decode(decryptedContent));
                document.close();
            } catch (e) {
                console.error(e);
                alert("檔案資料解密失敗！");
                sessionStorage.removeItem(SESSION_PASS_KEY);
                location.reload();
            }
        }
    </script>
