<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雲端銷售手冊</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* 深藍色背景設定 */
        body {
            background-color: #0f172a; /* 深藍色 (Slate 900) */
        }

        /* 卡片基礎樣式：預設白色填充 */
        .menu-card { 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            cursor: pointer; 
            position: relative;
            background-color: white !important;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* 滑鼠滑過效果：綠色填充，文字變白 */
        .menu-card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 15px 30px rgba(0,0,0,0.3); 
            background-color: #16a34a !important; /* 綠色 (Green 600) */
            z-index: 10; 
        }

        .menu-card h3 {
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), color 0.4s ease;
            transform-origin: left center;
            display: inline-block;
            white-space: nowrap; 
            color: #1e293b; /* 預設深色文字 */
        }

        /* 滑過時文字與圖示的變化 */
        .menu-card:hover h3 {
            transform: scale(1.1);
            color: white !important; 
        }

        .menu-card:hover i {
            color: white !important;
        }

        .menu-card:hover .icon-box {
            background-color: rgba(255, 255, 255, 0.2) !important;
        }
        
        #content-viewer-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999; background: white; }
        #loading-spinner { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 9998; display: none; text-align: center; }

        /* 導航按鈕樣式 */
        .nav-overlay { position: fixed; top: 20px; left: 20px; z-index: 10000; touch-action: none; }
        .nav-btn {
            background: rgba(255, 255, 255, 0.9); 
            width: 70px; height: 70px; border-radius: 15px; font-weight: 900;
            border: 2px solid #1e293b; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: move; user-select: none; transition: all 0.2s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .nav-btn:hover { background: #16a34a; color: white; border-color: white; }

        .outline-text {
            color: #1f2937; 
            font-size: 0.75rem; line-height: 1.2; font-weight: bold;
            margin-top: 2px;
        }
        .nav-btn:hover .outline-text { color: white; }

        #content-iframe { width: 100%; height: 100%; border: none; background: white; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        #admin-panel {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8);
            z-index: 10001; padding: 1.5rem;
        }
        .admin-modal {
            background: white; width: 100%; max-width: 1000px; border-radius: 20px;
            max-height: 90vh; display: flex; flex-direction: column; position: relative;
        }
    </style>

            if (!str) return '';
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }

        // ================= 匯出 HTML (寫死資料) =================
        function exportHTML() {
            // 1. 將最新的 siteData 寫入 <script id="app-data">
            const scriptTag = document.getElementById('app-data');
            scriptTag.textContent = `\n        let siteData = ${JSON.stringify(siteData, null, 12)};\n    `;

            // 2. 複製整份文件
            const clone = document.documentElement.cloneNode(true);

            // 3. 清理複製出來的 UI 狀態 (避免導出時顯示為後台開啟狀態)
            const adminPanel = clone.querySelector('#admin-panel');
            if (adminPanel) adminPanel.style.display = 'none';
            
            const body = clone.querySelector('body');
            if (body) body.style.overflow = 'auto';

            const dynamicContent = clone.querySelector('#dynamic-content');
            if (dynamicContent) dynamicContent.innerHTML = ''; // 讓它在新檔案載入時重新生成，保持程式碼乾淨

            const viewer = clone.querySelector('#content-viewer-container');
            if (viewer) viewer.style.display = 'none';

            // 4. 組裝 HTML 字串
            const htmlContent = `<!DOCTYPE html>\n<html lang="zh-Hant">\n${clone.innerHTML}\n</html>`;

            // 5. 觸發下載
            const blob = new Blob([htmlContent], { type: 'text/html;charset=utf-8' });
            const a = document.createElement('a');
            const url = URL.createObjectURL(blob);
            a.href = url;
            a.download = 'index.html'; // 強制檔名為 index.html
            document.body.appendChild(a);
            a.click();
            setTimeout(() => {
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }, 0);
        }

        // ================= 檔案檢視器與拖曳邏輯 =================
        function openViewer(url) {
            if (!url) {
                alert("請先在後台設定連結網址！");
                return;
            }
            const container = document.getElementById('content-viewer-container');
            const spinner = document.getElementById('loading-spinner');
            const ifr = document.getElementById('content-iframe');
            
            container.style.display = 'block';
            spinner.style.display = 'block';
            document.body.style.overflow = 'hidden'; 
            
            ifr.src = url;
            ifr.onload = () => spinner.style.display = 'none';
        }

        function closeViewer() {
            document.getElementById('content-viewer-container').style.display = 'none';
            document.getElementById('content-iframe').src = ''; 
            document.body.style.overflow = 'auto';
        }

        let isDragging = false, startX, startY, initL, initT, hasMoved = false;
        const dragElem = document.getElementById('draggable-nav');

        dragElem.onmousedown = (e) => {
            isDragging = true;
            hasMoved = false;
            startX = e.clientX;
            startY = e.clientY;
            const r = dragElem.getBoundingClientRect();
            initL = r.left;
            initT = r.top;
        };

        window.onmousemove = (e) => {
            if (!isDragging) return;
            const dx = e.clientX - startX;
            const dy = e.clientY - startY;
            if (Math.abs(dx) > 5 || Math.abs(dy) > 5) hasMoved = true;
            dragElem.style.left = `${Math.max(10, Math.min(initL + dx, window.innerWidth - 80))}px`;
            dragElem.style.top = `${Math.max(10, Math.min(initT + dy, window.innerHeight - 80))}px`;
        };

        window.onmouseup = () => { isDragging = false; };

        // 觸控支援
        dragElem.ontouchstart = (e) => {
            isDragging = true;
            hasMoved = false;
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
            const r = dragElem.getBoundingClientRect();
            initL = r.left;
            initT = r.top;
        };
        window.ontouchmove = (e) => {
            if (!isDragging) return;
            const dx = e.touches[0].clientX - startX;
            const dy = e.touches[0].clientY - startY;
            if (Math.abs(dx) > 5 || Math.abs(dy) > 5) hasMoved = true;
            dragElem.style.left = `${Math.max(10, Math.min(initL + dx, window.innerWidth - 80))}px`;
            dragElem.style.top = `${Math.max(10, Math.min(initT + dy, window.innerHeight - 80))}px`;
        };
        window.ontouchend = () => { isDragging = false; };

        document.getElementById('home-btn').onclick = () => {
            if (!hasMoved) closeViewer();
        };

        // 頁面載入時渲染
        window.onload = renderMain;
    </script>








</body>
